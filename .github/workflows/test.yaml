name: Test custom action
on:
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: write

jobs:
  lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Update Modrinth project lock-file
        uses: seanchristians/modrinth-project-lock@main
        with:
          project-file: samples/modrinth.yaml
