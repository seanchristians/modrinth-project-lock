name: Test custom action
on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Update Modrinth project lock-file
        uses: seanchristians/modrinth-project-lock@main
        with:
          project-file: samples/modrinth.yaml
